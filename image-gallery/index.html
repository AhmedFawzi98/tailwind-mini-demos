<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./output.css" />
        <title>Image Gallery</title>
    </head>
    <body>
        <!-- global contianer-->
        <div class="min-h-screen flex items-center justify-center bg-cyan-50">
            <!-- component contianer-->
            <div
                class="p-6 md:p-40 m-3 space-y-3 md:space-y-10 bg-white shadow-2xl rounded-3xl"
            >
                <!--navigation-->
                <nav>
                    <ul
                        class="flex flex-col md:flex-row items-center justify-center gap-4"
                    >
                        <li>
                            <a href="#" class="link-underline">vector</a>
                        </li>
                        <li>
                            <a href="#" class="link-underline">illustrations</a>
                        </li>
                        <li>
                            <a href="#" class="link-underline">images</a>
                        </li>
                        <li>
                            <a href="#" class="link-underline">icons</a>
                        </li>
                    </ul>
                </nav>
                <!--search bar-->
                <div class="flex items-center justify-center">
                    <input
                        type="text"
                        placeholder="search"
                        class="px-8 md:px-24 py-1 rounded-xl border-b border-black/30 placeholder:text-center"
                    />
                    <button type="submit" aria-label="search">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="icon-16 relative right-6 hover:scale-125"
                            viewBox="0 0 512 512"
                            aria-hidden="true"
                        >
                            <path
                                d="M221.09 64a157.09 157.09 0 10157.09 157.09A157.1 157.1 0 00221.09 64z"
                                fill="none"
                                stroke="currentColor"
                                stroke-miterlimit="10"
                                stroke-width="32"
                            />
                            <path
                                fill="none"
                                stroke="currentColor"
                                stroke-linecap="round"
                                stroke-miterlimit="10"
                                stroke-width="32"
                                d="M338.29 338.29L448 448"
                            />
                        </svg>
                    </button>
                </div>
                <!--file upload-->
                <form
                    enctype="multipart/form-data"
                    class="flex flex-col items-center justify-center gap-2 md:flex-row md:justify-end"
                >
                    <div>
                        <label
                            for="file-upload"
                            class="inline-block cursor-pointer px-16 md:px-6 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-600"
                        >
                            Upload file
                        </label>
                        <input id="file-upload" type="file" class="hidden" />
                    </div>
                </form>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="gallery-item">
                        <img
                            src="img/image1.jpg"
                            alt="gallery image"
                            class="gallery-img"
                        />
                    </div>
                          <div class="gallery-item">
                        <img
                            src="img/image2.jpg"
                            alt="gallery image"
                            class="gallery-img"
                        />
                    </div>
                          <div class="gallery-item">
                        <img
                            src="img/image3.jpg"
                            alt="gallery image"
                            class="gallery-img"
                        />
                    </div>
                          <div class="gallery-item">
                        <img
                            src="img/image4.jpg"
                            alt="gallery image"
                            class="gallery-img"
                        />
                    </div>
                          <div class="gallery-item">
                        <img
                            src="img/image5.jpg"
                            alt="gallery image"
                            class="gallery-img"
                        />
                    </div>
                          <div class="gallery-item">
                        <img
                            src="img/image6.jpg"
                            alt="gallery image"
                            class="gallery-img"
                        />
                    </div>

            </div>
        </div>
    </body>
</html>
