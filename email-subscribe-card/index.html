<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./output.css" />
        <title>Email Subscribe Card</title>
    </head>
    <body>
        <div class="min-h-screen flex p-4 items-center bg-slate-200">
            <article
                class="max-w-80 md:max-w-5xl h-[40rem] md:h-96 mx-auto p-2 flex flex-col gap-4 md:flex-row text-center md:text-left bg-slate-900 rounded-xl overflow-hidden shadow-md shadow-black/40"
            >
                <div
                    class="flex-1 min-h-0 basis-1/2 md:basis-1/2 lg:basis-[40%] bg-slate-950 rounded-t-xl md:rounded-l-xl md:rounded-r-none overflow-hidden"
                >
                    <img
                        src="./img/swe-newsletter.png"
                        alt="Software engineering newsletter logo"
                        class="w-full h-full object-cover object-center transition-transform duration-300 hover:scale-105"
                    />
                </div>

                <div
                    class="self-center flex-1 min-h-0 basis-1/2 md:basis-1/2 lg:basis-[60%] p-4 lg:px-2"
                >
                    <h3
                        class="mb-6 font-bold text-md text-cyan-400 tracking-wide md:text-2xl lg:text-3xl"
                    >
                        Get software engineering updates and news
                        in&nbsp;your&nbsp;inbox
                    </h3>

                    <p
                        class="mb-8 md:mb-12 lg:mb-12 text-sm text-slate-300 leading-relaxed md:text-lg lg:text-xl"
                    >
                        Be a better software engineer, always stay updated with
                        new technologies! Sign up for SWE&nbsp;newsletter
                    </p>

                    <form>
                        <div
                            class="flex flex-col lg:flex-row gap-4 text-l lg:text-xl"
                        >
                            <input
                                type="email"
                                name="email"
                                autocomplete="email"
                                placeholder="Enter your email address"
                                class="p-2 basis-2/3 bg-slate-800 border border-slate-600 text-slate-100 text-center placeholder:text-slate-400 rounded-md"
                            />

                            <button
                                type="submit"
                                class="basis-1/3 p-2 font-bold bg-cyan-500 text-white rounded-md transition-all duration-300 hover:bg-cyan-600 hover:translate-y-0.5"
                            >
                                Subscribe
                            </button>
                        </div>
                    </form>
                </div>
            </article>
        </div>
    </body>
</html>
