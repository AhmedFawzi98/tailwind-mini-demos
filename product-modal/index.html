<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./output.css" />
        <title>Product Modal</title>
    </head>
    <body class="min-h-screen bg-slate-300">
        <!--Global contianer-->
        <div class="min-h-screen flex items-center justify-center">
            <!--Modal-->
            <div
                role="dialog"
                aria-modal="true"
                aria-label="product details"
                class="md:flex md:flex-col md:justify-center max-w-sm h-[50rem] md:h-[32rem] md:max-w-3xl my-4 bg-white rounded-3xl shadow-xl shadow-black/20 overflow-hidden"
            >
                <article class="flex flex-col gap-4 p-4 md:flex-row">
                    <!-- product content -->
                    <div class="flex-1 basis-1/3 min-h-0">
                        <img
                            src="./img/headphone.png"
                            alt="an image of a product"
                            class="w-full h-full md:h-[50%] object-contain transition-transform duration-300 hover:scale-105"
                        />
                    </div>

                    <div
                        class="flex flex-col flex-1 items-center md:items-start basis-2/3 min-h-0"
                    >
                        <div class="tags mb-2">
                            <p class="tag bg-black text-white">free shipping</p>
                        </div>

                        <h3
                            class="mb-4 text-center md:text-left capitalize font-xl md:text-2xl font-bold"
                        >
                            great headphone with active noise cancellation
                        </h3>
                        <p class="old-price">$799</p>
                        <p class="mb-2 text-3xl font-bold">$499</p>
                        <p class="mb-4 text-gray-400">
                            limited time offer, ends last of month.
                        </p>
                        <button
                            class="btn btn-primary mb-2 text-white w-full md:text-xl"
                        >
                            add to cart
                        </button>
                        <div class="mb-6 icon-with-text self-start">
                            <svg
                                class="icon-16"
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 512 512"
                            >
                                <path
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="32"
                                    d="M416 128L192 384l-96-96"
                                />
                            </svg>
                            <p class="text-gray-400">available 50+ in stock</p>
                        </div>
                        <div
                            class="flex flex-col gap-2 md:flex-row md:justify-around w-full text-xs md:text-lg"
                        >
                            <button class="btn btn-secondary icon-with-text">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    class="icon-16"
                                    viewBox="0 0 512 512"
                                >
                                    <path
                                        d="M352.92 80C288 80 256 144 256 144s-32-64-96.92-64c-52.76 0-94.54 44.14-95.08 96.81-1.1 109.33 86.73 187.08 183 252.42a16 16 0 0018 0c96.26-65.34 184.09-143.09 183-252.42-.54-52.67-42.32-96.81-95.08-96.81z"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="32"
                                    />
                                </svg>
                                <p>add to wishlist</p>
                            </button>
                            <button class="btn btn-secondary icon-with-text">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    class="icon-16"
                                    viewBox="0 0 512 512"
                                >
                                    <path
                                        d="M80 464V68.14a8 8 0 014-6.9C91.81 56.66 112.92 48 160 48c64 0 145 48 192 48a199.53 199.53 0 0077.23-15.77 2 2 0 012.77 1.85v219.36a4 4 0 01-2.39 3.65C421.37 308.7 392.33 320 352 320c-48 0-128-32-192-32s-80 16-80 16"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-linecap="round"
                                        stroke-miterlimit="10"
                                        stroke-width="32"
                                    />
                                </svg>
                                <p>report product</p>
                            </button>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </body>
</html>
